name: Desplegar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v5

      - name: Generar config.js desde el secret
        run: echo "const API_KEY = \"${{ secrets.OPENWEATHERMAP_API_KEY }}\";" > config.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir archivos
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
